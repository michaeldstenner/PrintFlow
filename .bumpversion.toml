[tool.bumpversion]
current_version = "1.0.0"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
search = "{current_version}"
replace = "{new_version}"
commit = true
tag = true
commit_args = "--no-verify"

[[tool.bumpversion.files]]
filename = "PrintFlow.FCMacro"
search = "__Version__ = \"{current_version}\""
replace = "__Version__ = \"{new_version}\""

[[tool.bumpversion.files]]
filename = "PrintFlow.FCMacro"
search = "__Date__ = \"\\d{4}-\\d{2}-\\d{2}\""
replace = "__Date__ = \"{utcnow:%Y-%m-%d}\""
regex = true

[[tool.bumpversion.files]]
filename = "docs/PrintFlowManual.md"
search = "*This manual covers PrintFlow version {current_version}*"
replace = "*This manual covers PrintFlow version {new_version}*"